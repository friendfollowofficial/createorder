<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Order - Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#eef2ff,#f8f9ff);
}

.card{
  background:white;
  padding:50px;
  border-radius:25px;
  box-shadow:0 25px 60px rgba(0,0,0,.08);
  text-align:center;
  max-width:420px;
  width:90%;
}

.card h1{
  margin-top:0;
  margin-bottom:10px;
}

.card p{
  color:#555;
  font-size:14px;
}

.pro-btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 28px;
  border-radius:16px;
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:white;
  text-decoration:none;
  font-weight:600;
  font-size:16px;
  transition:.3s;
  box-shadow:0 15px 35px rgba(79,70,229,.3);
}

.pro-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 25px 50px rgba(79,70,229,.5);
}
</style>
</head>

<body>

<div class="card">
  <h1>➕ สร้างออเดอร์แอดมิน</h1>
  <p>กดปุ่มด้านล่างเพื่อเปิดหน้าสร้างออเดอร์ของระบบหลัก</p>

  <a href="https://script.google.com/macros/s/AKfycbwRoeKeDRuo8TuA26_JPACN_Z2jtLoI8CiM1znHnsk3Sk3n3YJ4QrAAl8cFdxFigClS/exec"
     class="pro-btn">
     เปิดหน้าสร้างออเดอร์
  </a>
</div>

</body>
</html>
