<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Friend Follow | Admin Create</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#efeafd;
  --bg2:#e4d9f7;
  --bg3:#d7cbee;
  --glass:rgba(255,255,255,.85);
  --text:#9f8af9;
}

body{
  margin:0;
  font-family:'Prompt',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  transition:.5s ease;
}

/* ===== Dark Mode ===== */
body.dark{
  --bg1:#0f172a;
  --bg2:#111827;
  --bg3:#1e293b;
  --glass:rgba(30,41,59,.8);
  --text:#a78bfa;
}

/* ===== Floating Luxury Bubbles ===== */
.bubble{
  position:fixed;
  bottom:-150px;
  border-radius:50%;
  backdrop-filter:blur(10px);
  background:radial-gradient(circle at 30% 30%,
     rgba(255,255,255,.9),
     rgba(173,216,255,.4),
     rgba(202,166,255,.35),
     rgba(255,158,214,.3));
  box-shadow:
     0 0 60px rgba(200,150,255,.35),
     inset 0 0 30px rgba(255,255,255,.9);
  animation:floatUp linear infinite;
  z-index:-1;
  opacity:.9;
}

@keyframes floatUp{
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(-120vh) scale(1.3);}
}

/* ===== Brand ===== */
.brand{
  position:absolute;
  top:40px;
  text-align:center;
  width:100%;
}

.brand h2{
  margin:0;
  font-size:28px;
  font-weight:800;
  color:var(--text);
}

.brand span{
  font-size:12px;
  letter-spacing:5px;
  opacity:.6;
}

/* ===== 3D Glass Card ===== */
.card{
  position:relative;
  background:var(--glass);
  backdrop-filter:blur(25px);
  padding:70px;
  border-radius:45px;
  text-align:center;
  box-shadow:
    0 40px 100px rgba(160,120,240,.25);
  max-width:520px;
  width:92%;
  transition:.4s ease;
}

.card::before{
  content:"";
  position:absolute;
  top:-2px;
  left:-2px;
  right:-2px;
  bottom:-2px;
  border-radius:50px;
  background:linear-gradient(45deg,#a78bfa,#f0abfc,#93c5fd,#a78bfa);
  z-index:-1;
  animation:borderShift 6s linear infinite;
  background-size:400% 400%;
  opacity:.6;
}

@keyframes borderShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card h1{
  font-size:34px;
  margin:0;
  font-weight:800;
  color:var(--text);
}

.card p{
  font-size:14px;
  margin-top:18px;
  opacity:.7;
}

/* ===== Premium Button ===== */
.pro-btn{
  display:inline-block;
  margin-top:35px;
  padding:18px 45px;
  border-radius:50px;
  font-weight:700;
  font-size:16px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#8fd3ff,#caa6ff,#ff9ed6);
  background-size:300% 300%;
  animation:gradientShift 8s ease infinite;
  box-shadow:0 20px 60px rgba(180,140,255,.5);
  transition:.3s ease;
  position:relative;
  overflow:hidden;
}

.pro-btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
  transition:.7s;
}

.pro-btn:hover::before{
  left:100%;
}

.pro-btn:hover{
  transform:translateY(-5px) scale(1.08);
  box-shadow:0 30px 80px rgba(180,140,255,.7);
}

@keyframes gradientShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ===== Toggle Dark Mode ===== */
.toggle{
  position:absolute;
  bottom:30px;
  right:40px;
  cursor:pointer;
  font-size:13px;
  padding:8px 14px;
  border-radius:30px;
  background:rgba(0,0,0,.1);
  backdrop-filter:blur(5px);
}
body.dark .toggle{
  background:rgba(255,255,255,.1);
  color:white;
}
</style>
</head>

<body>

<!-- Floating Bubbles -->
<div class="bubble" style="left:8%;width:130px;height:130px;animation-duration:32s;"></div>
<div class="bubble" style="left:25%;width:70px;height:70px;animation-duration:24s;"></div>
<div class="bubble" style="left:50%;width:180px;height:180px;animation-duration:40s;"></div>
<div class="bubble" style="left:70%;width:80px;height:80px;animation-duration:26s;"></div>
<div class="bubble" style="left:85%;width:120px;height:120px;animation-duration:34s;"></div>

<div class="brand">
  <h2>Friend Follow</h2>
  <span>PREMIUM ADMIN PANEL</span>
</div>

<div class="card">
  <h1>สร้างออเดอร์แอดมิน</h1>
  <p>เฉพาะแอดมิน</p>

  <a href="https://script.google.com/macros/s/AKfycbwRoeKeDRuo8TuA26_JPACN_Z2jtLoI8CiM1znHnsk3Sk3n3YJ4QrAAl8cFdxFigClS/exec"
     class="pro-btn">
     เข้าสู่ระบบ
  </a>
</div>

<div class="toggle" onclick="toggleMode()">🌙 Toggle Mode</div>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
