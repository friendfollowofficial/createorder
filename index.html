<title>Redirecting...</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Segoe UI,Arial;
  background:linear-gradient(135deg,#eef2ff,#f8f9ff);
}

.box{
  background:white;
  padding:40px 60px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  text-align:center;
}

.loader{
  margin-top:20px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:4px solid #ddd;
  border-top:4px solid #6366f1;
  animation:spin 1s linear infinite;
  margin-left:auto;
  margin-right:auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">
  <h2>กำลังเปิดหน้าสร้างออเดอร์…</h2>
  <p>กรุณารอสักครู่</p>
  <div class="loader"></div>
</div>
