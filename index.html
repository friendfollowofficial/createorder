<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Friend Follow | Loading...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#a78bfa,#0f172a 70%);
  color:white;
}

/* Glow vignette */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle,transparent 60%,rgba(0,0,0,.7));
  pointer-events:none;
}

/* Bubble */
.bubble{
  position:fixed;
  bottom:-120px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.9),rgba(167,139,250,.5));
  opacity:.5;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(0)}
  to{transform:translateY(-120vh)}
}

/* Center Box */
.box{
  text-align:center;
  animation:fadeIn 1s ease forwards;
  opacity:0;
}
@keyframes fadeIn{
  to{opacity:1}
}

h1{
  margin:0;
  font-size:32px;
  font-weight:800;
  letter-spacing:1px;
}

.count{
  font-size:60px;
  margin-top:20px;
  font-weight:800;
  color:#f0abfc;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

.subtitle{
  margin-top:15px;
  opacity:.7;
}

/* particles */
.particle{
  position:fixed;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  opacity:.4;
  animation:floatParticle linear infinite;
}
@keyframes floatParticle{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<!-- bubbles -->
<div class="bubble" style="left:10%;width:120px;height:120px;animation-duration:25s;"></div>
<div class="bubble" style="left:35%;width:80px;height:80px;animation-duration:18s;"></div>
<div class="bubble" style="left:65%;width:150px;height:150px;animation-duration:32s;"></div>
<div class="bubble" style="left:85%;width:70px;height:70px;animation-duration:20s;"></div>

<div class="box">
  <h1>Friend Follow</h1>
  <div class="count" id="count">3</div>
  <div class="subtitle">กำลังเปิดหน้าสร้างออเดอร์...</div>

  <button id="enterBtn" onclick="go()" 
  style="
  margin-top:25px;
  padding:15px 40px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#a78bfa,#f0abfc,#93c5fd);
  color:white;
  font-weight:700;
  font-size:16px;
  display:none;
  cursor:pointer;
  box-shadow:0 20px 50px rgba(167,139,250,.6);
  ">
  เข้าสู่หน้าสร้างออเดอร์
  </button>

</div>

  

<script>
// Particle sparkle
for(let i=0;i<30;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=8+Math.random()*10+"s";
  p.style.animationDelay=Math.random()*5+"s";
  document.body.appendChild(p);
}

// Countdown + Redirect
let counter = 3;
const countEl = document.getElementById("count");
const btn = document.getElementById("enterBtn");

const interval = setInterval(()=>{
  counter--;
  countEl.innerText = counter;

  if(counter <= 0){
    clearInterval(interval);
    countEl.style.display = "none";
    btn.style.display = "inline-block";
  }
},1000);

function go(){
  location.href = "https://script.google.com/macros/s/AKfycbxgZ2SNmUFs6MUU8CDd9o3_7-tdo1mIlZgd-yne0HTaCpu7rS5VU2Ck-u6N38hQKmkJ/exec";
}
</script>

</body>
</html>
