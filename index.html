<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FF Admin - Create Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8f9ff);
  padding:40px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
}

.title{
  font-size:28px;
  font-weight:700;
}

.back-btn{
  text-decoration:none;
  background:#111827;
  color:white;
  padding:8px 14px;
  border-radius:10px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
}

.card{
  background:white;
  padding:30px;
  border-radius:22px;
  box-shadow:0 15px 35px rgba(0,0,0,.05);
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 25px 50px rgba(0,0,0,.1);
}

.card h2{
  margin-top:0;
}

.card p{
  font-size:14px;
  color:#555;
}

.pro-btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  border-radius:14px;
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
  box-shadow:0 10px 25px rgba(79,70,229,.3);
}

.pro-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(79,70,229,.5);
}
</style>
</head>

<body>

<div class="header">
  <div class="title">➕ สร้างออเดอร์แอดมิน</div>
  <a href="https://friendfollowofficial.github.io/admin/" class="back-btn">
    ← กลับ Dashboard
  </a>
</div>

<div class="grid">

  <!-- Create Order Script -->
  <div class="card">
    <h2>🚀 สร้างออเดอร์ใหม่</h2>
    <p>เปิดหน้าเพิ่มออเดอร์และบันทึกข้อมูลเข้าสู่ระบบหลัก</p>
    <a href="https://script.google.com/macros/s/AKfycbwRoeKeDRuo8TuA26_JPACN_Z2jtLoI8CiM1znHnsk3Sk3n3YJ4QrAAl8cFdxFigClS/exec"
       class="pro-btn">
       เปิดหน้าสร้างออเดอร์
    </a>
  </div>

  <!-- Check Order -->
  <div class="card">
    <h2>🔎 ตรวจสอบออเดอร์</h2>
    <p>เปิดหน้าเช็คสถานะออเดอร์สำหรับตรวจสอบข้อมูล</p>
    <a href="https://script.google.com/macros/s/AKfycbza85VQyvGoela_cSrJq5Ec1b9wRQtFAt1bz1Eyy0ozk5f3F6aBaW21xEylQuZoxwXYTQ/exec"
       class="pro-btn">
       เปิดหน้าเช็คออเดอร์
    </a>
  </div>

</div>

</body>
</html>
