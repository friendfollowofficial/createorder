<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Friend Follow | Create Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Prompt',sans-serif;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,#efeafd,#e4d9f7,#d7cbee);
  position:relative;
}

/* ===== Bubble Effect ===== */
.bubble{
  position:fixed;
  bottom:-150px;
  border-radius:50%;
  backdrop-filter:blur(8px);
  background:radial-gradient(circle at 30% 30%,
     rgba(255,255,255,.9),
     rgba(173,216,255,.4),
     rgba(202,166,255,.35),
     rgba(255,158,214,.3));
  box-shadow:
     0 0 40px rgba(200,150,255,.35),
     inset 0 0 25px rgba(255,255,255,.8);
  animation:floatUp linear infinite;
  z-index:-1;
}

@keyframes floatUp{
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(-120vh) scale(1.25);}
}

/* ===== Card ===== */
.card{
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(20px);
  padding:60px;
  border-radius:40px;
  text-align:center;
  box-shadow:0 30px 80px rgba(160,120,240,.25);
  max-width:480px;
  width:90%;
}

h1{
  margin:0;
  font-size:32px;
  font-weight:800;
  color:#9f8af9;
}

p{
  margin-top:15px;
  color:#555;
  font-size:14px;
}

/* ===== Luxury Button ===== */
.pro-btn{
  display:inline-block;
  margin-top:30px;
  padding:16px 36px;
  border-radius:40px;
  background:linear-gradient(90deg,#8fd3ff,#caa6ff,#ff9ed6);
  color:white;
  text-decoration:none;
  font-weight:700;
  font-size:16px;
  box-shadow:0 15px 40px rgba(180,140,255,.4);
  transition:.3s ease;
  letter-spacing:.5px;
}

.pro-btn:hover{
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 30px 70px rgba(180,140,255,.6);
}

.brand{
  position:absolute;
  top:40px;
  text-align:center;
  width:100%;
}

.brand h2{
  margin:0;
  font-size:26px;
  color:#9f8af9;
}

.brand span{
  font-size:12px;
  letter-spacing:4px;
  color:#b19cd9;
}
</style>
</head>

<body>

<!-- Floating Bubbles -->
<div class="bubble" style="left:8%;width:120px;height:120px;animation-duration:30s;"></div>
<div class="bubble" style="left:25%;width:60px;height:60px;animation-duration:20s;"></div>
<div class="bubble" style="left:50%;width:160px;height:160px;animation-duration:36s;"></div>
<div class="bubble" style="left:70%;width:80px;height:80px;animation-duration:26s;"></div>
<div class="bubble" style="left:85%;width:100px;height:100px;animation-duration:32s;"></div>

<div class="brand">
  <h2>Friend Follow</h2>
  <span>ADMIN PANEL</span>
</div>

<div class="card">
  <h1>➕ สร้างออเดอร์แอดมิน</h1>
  <p>กดปุ่มด้านล่างเพื่อเปิดหน้าสร้างออเดอร์ของระบบหลัก</p>

  <a href="https://script.google.com/macros/s/AKfycbwRoeKeDRuo8TuA26_JPACN_Z2jtLoI8CiM1znHnsk3Sk3n3YJ4QrAAl8cFdxFigClS/exec"
     class="pro-btn">
     🚀 เปิดหน้าสร้างออเดอร์
  </a>
</div>

</body>
</html>
